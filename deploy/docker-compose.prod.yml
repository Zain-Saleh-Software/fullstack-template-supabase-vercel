# Production Docker Compose with Nginx reverse proxy in front
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: fullstack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl:/etc/ssl:ro
      - static_files:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - fullstack-network

  redis:
    image: redis:7-alpine
    container_name: fullstack-redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fullstack-network
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-local}/backend:${DOCKER_IMAGE_TAG:-latest}
    container_name: fullstack-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fullstack-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-local}/frontend:${DOCKER_IMAGE_TAG:-latest}
    container_name: fullstack-frontend
    restart: unless-stopped
    expose:
      - "80"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fullstack-network

volumes:
  static_files:
  redis-data:

networks:
  fullstack-network:
    driver: bridge
