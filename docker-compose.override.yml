services:
  backend:
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api/v1
      - VITE_PROXY_TARGET=http://host.docker.internal:${BACKEND_PORT:-8000}
      - VITE_HMR_CLIENT_PORT=${FRONTEND_PORT:-80}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "rm -rf /app/node_modules/.vite && npm run dev"

  redis:
    volumes:
      - redis-data:/data

volumes:
  redis-data:
