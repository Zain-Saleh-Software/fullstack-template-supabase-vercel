services:
  backend:
    command: sh -c "python -m app.utils.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    container_name: fullstack-frontend-dev
    command: sh -c "rm -rf /app/node_modules/.vite && npm install && npm run dev -- --host 0.0.0.0 --port 80"
    working_dir: /app
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api/v1
      - VITE_PROXY_TARGET=http://host.docker.internal:${BACKEND_PORT:-8000}
      - VITE_HMR_CLIENT_PORT=${FRONTEND_PORT:-80}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
